server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # nginx のバージョン情報をレスポンスヘッダーから隠す
    server_tokens off;

    # SPA ルーティング:
    # ファイルが存在しないパスはすべて index.html へフォールバックする
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静的アセットは長期キャッシュ（Vite はハッシュ付きファイル名を生成するため安全）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ========================================================
    # セキュリティヘッダー
    # ========================================================

    # クリックジャッキング対策: 同オリジンの iframe のみ許可
    add_header X-Frame-Options "SAMEORIGIN";

    # MIME スニッフィング対策
    add_header X-Content-Type-Options "nosniff";

    # リファラー情報の送信範囲を制限
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Content Security Policy:
    #   - script-src / style-src: Vite バンドルのみ許可（外部スクリプト禁止）
    #   - connect-src: Gemini API への通信のみ外部接続を許可
    #   - media-src: MediaRecorder が生成する blob URL を許可（マイク録音用）
    #   - worker-src: Vite が生成する Web Worker 用の blob URL を許可
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://generativelanguage.googleapis.com; img-src 'self' data: blob:; media-src blob: mediastream:; worker-src 'self' blob:;";

    # Permissions Policy:
    #   マイクアクセスを同オリジンに限定し、不要なブラウザ機能を無効化
    add_header Permissions-Policy "microphone=(self), camera=(), geolocation=(), payment=()";
}
